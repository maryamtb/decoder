name: Publish MCP Server to PyPI

on:
  release:
    types: [published]

jobs:
  publish:
    if: ${{ startsWith(github.event.release.tag_name, 'mcp-server-v') }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    environment: pypi
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python 3.11
        run: uv python install 3.11

      - name: Sync dependencies
        run: uv sync --directory mcp-server-decoder

      - name: Build package
        run: uv build --directory mcp-server-decoder

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: mcp-server-decoder/dist/
